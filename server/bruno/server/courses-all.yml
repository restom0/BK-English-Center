info:
  name: Public courses list
  type: http
  seq: 2
  tags:
    - smoke
    - courses

http:
  method: GET
  url: '{{baseUrl}}/courses/all'

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns HTTP 200", function() {
          expect(res.status).to.equal(200);
        });

        test("returns public course payload", function() {
          expect(res.body.check).to.equal(true);
          expect(res.body.data).to.be.an("array");
        });

        test("does not expose private course pricing fields", function() {
          if (res.body.data.length === 0) {
            return;
          }

          const first = res.body.data[0];
          expect(first).to.have.property("name");
          expect(first).to.not.have.property("paidStudent");
          expect(first).to.not.have.property("paidTeacher");
        });

settings:
  encodeUrl: true
  timeout: 10000
  followRedirects: true
  maxRedirects: 5
