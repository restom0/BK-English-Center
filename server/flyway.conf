# =============================================================
# Flyway configuration — BK English Center
#
# Versioned SQL migrations live under ./sql (V1__init.sql, ...).
# Generate the next migration (diff live DB -> new schema) with:
#   npx prisma migrate diff \
#     --from-url "$DATABASE_URL" \
#     --to-schema prisma/schema.prisma \
#     --script > sql/V2__<change>.sql
#
# Connection is supplied via environment variables so no secrets
# live in the repo (Flyway reads FLYWAY_URL / FLYWAY_USER /
# FLYWAY_PASSWORD). Local example:
#   FLYWAY_URL=jdbc:postgresql://localhost:5432/bkec
#   FLYWAY_USER=bkec
#   FLYWAY_PASSWORD=changeme
# =============================================================

flyway.locations=filesystem:sql
flyway.baselineOnMigrate=true
flyway.connectRetries=10
