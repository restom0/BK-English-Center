# =============================================================
# Nginx config -- BK English Center Frontend
# Serves static files + reverse-proxies all API paths to backend
# =============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_proxied any;

    # ── Static asset caching ──────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── /api prefix proxy (new canonical path) ───────────────────
    # When nginx sits behind a root reverse proxy that strips /api,
    # this block forwards /api/* → backend:3000/*
    location ^~ /api/ {
        rewrite            ^/api/(.*)$ /$1 break;
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── API reverse proxy (same-origin relative paths) ───────────
    # All backend route prefixes are forwarded to the backend service.
    # API_URL in config.js is set to "" in Docker so these relative
    # paths are caught here and proxied to backend:3000.
    location ~ ^/(users|courses|admins|classes|staffs|students|teachers|
                  studentjoinclasses|teacherjoinclasses|register-logs|logs|
                  sponsors|files|emails|sendMail|sendPay|sendPrize|
                  sendSalary|sendWarning|sendFile|sendCheer)(/|$) {

        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;

        # Pass real client info to Express
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep connections alive
        proxy_set_header   Connection        "";

        # Generous timeouts for long-running queries
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Friendly short URLs for new pages/ structure ─────────────
    # Allows /admin/dashboard, /student/marks etc. without /pages/ prefix
    location ~ ^/(admin|staff|teacher|student|public|auth)/(.+)$ {
        try_files /pages/$1/$2/index.html /pages/$1/$2 =404;
    }

    # ── SPA fallback ──────────────────────────────────────────
    # HTML pages are real files, not a SPA — try the file first,
    # then fall back to the home page.
    location / {
        try_files $uri $uri/ $uri.html /pages/public/home/index.html;
    }

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin" always;

    # ── Hide nginx version ────────────────────────────────────
    server_tokens off;

    # ── Error pages ───────────────────────────────────────────
    error_page 404 /pages/auth/login/index.html;
    error_page 500 502 503 504 /pages/public/home/index.html;
}
