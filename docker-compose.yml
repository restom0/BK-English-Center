# =============================================================
# Docker Compose — BK English Center v2
# Services: postgres | redis | backend (Express+Prisma) | frontend (nginx)
#
# Quick start:
#   cp server/.env.example .env   # fill in secrets
#   docker compose up --build -d
#   docker compose logs -f
#   docker compose exec backend npm run db:seed   # optional seed
# =============================================================

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-bkec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-bkec}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      # Expose only on localhost for direct psql access during dev
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bkec} -d ${POSTGRES_DB:-bkec}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal

  # ── Redis 7 ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ── Express API (Prisma + ioredis) ───────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://${POSTGRES_USER:-bkec}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-bkec}?schema=public
      REDIS_URL:    redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  # ── nginx (static frontend + /api reverse proxy) ─────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

# ── Volumes ───────────────────────────────────────────────────
volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
