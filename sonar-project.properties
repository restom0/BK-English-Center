# ============================================================
# SonarCloud configuration
# NOTE: projectKey / organization must match your SonarCloud project.
# Defaults below assume the SonarCloud "restom0" org and the
# auto-generated key "restom0_BK-English-Center" — adjust if different.
# ============================================================

sonar.projectKey=restom0_BK-English-Center
sonar.organization=restom0
sonar.host.url=https://sonarcloud.io

# Sources analysed
sonar.sources=client,server
sonar.tests=server/test

# Exclude generated / vendored / minified assets
sonar.exclusions=**/node_modules/**,client/styles/main.css,client/styles/main.css.map,**/*.min.js,server/prisma/**,server/sql/**

# JS/TS test coverage (produced by `npm run test:cov` in ./server)
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info
