# ============================================================
# SonarCloud configuration
# NOTE: projectKey / organization must match your SonarCloud project.
# Defaults below assume the SonarCloud "restom0" org and the
# auto-generated key "restom0_BK-English-Center" — adjust if different.
# ============================================================

sonar.projectKey=restom0_BK-English-Center
sonar.organization=restom0
sonar.host.url=https://sonarcloud.io

# Sources analysed
sonar.sources=client,server
sonar.tests=server/test

# Exclude generated / vendored / minified assets
sonar.exclusions=**/node_modules/**,client/styles/main.css,client/styles/main.css.map,**/*.min.js,server/prisma/**,server/sql/**,*.sql

# Duplication scope
# Client pages are static templates and DOM-rendering controllers; CPD reports
# repeated markup/tooltip/table scaffolding as duplicate "new code". Keep issue
# analysis on those files, but exclude them from copy-paste detection.
sonar.cpd.exclusions=client/**/*.html,client/Navigation/*,client/Navigation/**/*,client/components/*.js,client/components/**/*.js,client/js/common/*.js,client/js/common/**/*.js,client/js/pages/**/*.js,client/*page/**/*.js,client/*Page/**/*.js,client/MyCourses/**/*.js,client/MyPage/**/*.js

# Coverage scope
# The client is static HTML/CSS + browser JS with no headless test harness, and
# these server modules only open external connections (Prisma/Redis) or bootstrap
# the process. None are reachable from the Jest suite, so keep them out of the
# coverage ratio. Issue analysis still applies to them.
sonar.coverage.exclusions=client/**/*,**/*.html,**/*.css,**/*.scss,server/src/config/**,server/src/bin/**,server/prisma/**

# JS/TS test coverage (produced by `npm run test:cov` in ./server)
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info
