# ============================================================
# CI — BK English Center
# Runs on every push and pull request to main / develop.
#
# Jobs:
#   lint-backend  — Prettier + ESLint checks on server code
#   build-css     — Compile SCSS → CSS and verify output
#   docker-build  — Validate both Dockerfiles compile cleanly
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel any in-progress run for the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 1. Backend linting ────────────────────────────────────────
  lint-backend:
    name: Lint backend (Prettier + ESLint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Check code quality (ESLint)
        run: npm run eslint

  # ── 2. CSS build ─────────────────────────────────────────────
  build-css:
    name: Build CSS (Sass)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Compile SCSS → CSS
        run: npm run build:css

      - name: Verify output exists and is non-empty
        run: |
          if [ ! -s styles/main.css ]; then
            echo "ERROR: styles/main.css is missing or empty"
            exit 1
          fi
          echo "main.css size: $(wc -c < styles/main.css) bytes ✓"

      - name: Upload compiled CSS (artifact)
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: compiled-css
          path: client/styles/main.css
          retention-days: 7

  # ── 3. Docker build validation ───────────────────────────────
  docker-build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: server
            dockerfile: server/Dockerfile
          - service: frontend
            context: client
            dockerfile: client/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Build ${{ matrix.service }} image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          tags: bkec/${{ matrix.service }}:ci-${{ github.sha }}

  # ── 4. Tests — unit + API (mocked) + integration (real DB) ───
  test:
    name: Tests (Jest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    # Postgres service so the integration tests run against a real DB.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bkec
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: bkec_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bkec -d bkec_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://bkec:changeme@localhost:5432/bkec_test?schema=public
      TEST_DATABASE_URL: postgresql://bkec:changeme@localhost:5432/bkec_test?schema=public
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Flyway migrations on the test database
        run: |
          docker run --rm --network host \
            -v "$PWD/sql:/flyway/sql:ro" \
            flyway/flyway:10-alpine \
            -url=jdbc:postgresql://localhost:5432/bkec_test \
            -user=bkec -password=changeme \
            -locations=filesystem:/flyway/sql \
            -baselineOnMigrate=true \
            -connectRetries=10 \
            migrate

      - name: Run server quality gate (format + ESLint + Jest coverage)
        run: npm run quality

      - name: Upload coverage report (lcov + HTML)
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: server-coverage
          path: server/coverage/
          retention-days: 7

      - name: Run Bruno API smoke collection
        run: npm run test:bruno

      - name: Upload Bruno API reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: bruno-api-reports
          path: server/bruno/reports/
          retention-days: 7
