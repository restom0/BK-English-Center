# ============================================================
# CI — BK English Center
# Runs on every push and pull request to main / develop.
#
# Jobs:
#   lint-backend  — Prettier format check on server/src/**
#   build-css     — Compile SCSS → CSS and verify output
#   docker-build  — Validate both Dockerfiles compile cleanly
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel any in-progress run for the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Backend linting ────────────────────────────────────────
  lint-backend:
    name: Lint backend (Prettier)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Check formatting (Prettier)
        run: npx prettier --check 'src/**/*.{js,json}'

  # ── 2. CSS build ─────────────────────────────────────────────
  build-css:
    name: Build CSS (Sass)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Compile SCSS → CSS
        run: npm run build:css

      - name: Verify output exists and is non-empty
        run: |
          if [ ! -s styles/main.css ]; then
            echo "ERROR: styles/main.css is missing or empty"
            exit 1
          fi
          echo "main.css size: $(wc -c < styles/main.css) bytes ✓"

      - name: Upload compiled CSS (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: compiled-css
          path: client/styles/main.css
          retention-days: 7

  # ── 3. Docker build validation ───────────────────────────────
  docker-build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: server
            dockerfile: server/Dockerfile
          - service: frontend
            context: client
            dockerfile: client/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image (no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          tags: bkec/${{ matrix.service }}:ci-${{ github.sha }}
