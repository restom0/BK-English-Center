# ============================================================
# SonarCloud manual scan with coverage.
# Automatic Analysis reads .sonarcloud.properties; manual CI scan reads
# sonar-project.properties and the args below.
# Requires repo secret: SONAR_TOKEN.
# ============================================================

name: SonarCloud

on:
  workflow_dispatch:

# Least privilege: the scan only needs to read the checkout.
permissions:
  contents: read

jobs:
  sonar:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0 # full history improves blame/new-code detection

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Server tests with coverage
        working-directory: server
        run: |
          npm ci
          npx prisma generate
          npm run test:cov || true

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        with:
          args: >
            -Dsonar.cpd.exclusions=client/**/*.html,client/Navigation/*,client/Navigation/**/*,client/components/*.js,client/components/**/*.js,client/js/common/*.js,client/js/common/**/*.js,client/js/pages/**/*.js,client/*page/**/*.js,client/*Page/**/*.js,client/MyCourses/**/*.js,client/MyPage/**/*.js
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
