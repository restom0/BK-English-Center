# ============================================================
# SonarCloud — static analysis + coverage (quality gate)
# Kept separate from ci.yml so a missing SONAR_TOKEN can't turn the
# core checks red. Requires repo secret: SONAR_TOKEN.
# ============================================================

name: SonarCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  sonar:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history → better blame/new-code detection

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Server tests with coverage
        working-directory: server
        run: |
          npm ci
          npx prisma generate
          npm run test:cov || true # coverage is best-effort; don't block the scan

      - name: Skip when SONAR_TOKEN is unavailable
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "::notice::Skipping SonarCloud scan because SONAR_TOKEN is not configured."

      - name: SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
