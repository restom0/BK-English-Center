# ============================================================
# SonarCloud — static analysis + coverage (quality gate)
# Kept separate from ci.yml so a missing SONAR_TOKEN can't turn the
# core checks red. Requires repo secret: SONAR_TOKEN.
# ============================================================

name: SonarCloud

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  sonar:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0 # full history → better blame/new-code detection

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Server tests with coverage
        working-directory: server
        run: |
          npm ci
          npx prisma generate
          npm run test:cov || true # coverage is best-effort; don't block the scan

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
