# ============================================================
# Deploy — BK English Center
# Triggers only after CI passes on pushes to main.
#
# Jobs:
#   publish   — Build & push multi-platform images to GHCR
#   deploy    — SSH into production server, pull & restart stack
#
# Required secrets (set in repo → Settings → Secrets → Actions):
#   DEPLOY_HOST        VPS hostname or IP
#   DEPLOY_USER        SSH user (e.g. ubuntu)
#   DEPLOY_SSH_KEY     Private key (PEM format, no passphrase)
#   DEPLOY_PATH        Absolute path to docker-compose dir on server
#   MYSQL_ROOT_PASSWORD
#   DB_PASSWORD
# ============================================================

name: Deploy

on:
  push:
    branches: [main]

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── 1. Build & push images to GHCR ──────────────────────────
  publish:
    name: Publish Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/bkec-backend
            ghcr.io/${{ github.repository_owner }}/bkec-frontend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: server
          file: server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ghcr.io/${{ github.repository_owner }}/bkec-backend:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/bkec-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v7
        with:
          context: client
          file: client/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ghcr.io/${{ github.repository_owner }}/bkec-frontend:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/bkec-frontend:latest

  # ── 2. Rolling deploy via SSH ─────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: publish
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            echo "=== Pulling latest images ==="
            docker compose pull backend frontend

            echo "=== Rolling update (zero-downtime) ==="
            docker compose up -d --no-deps --remove-orphans backend frontend

            echo "=== Pruning old images ==="
            docker image prune -f

            echo "=== Health check ==="
            sleep 10
            docker compose ps
            docker compose exec -T backend wget -qO- http://localhost:3000/health \
              || echo "WARNING: health endpoint not responding"

      - name: Create deployment annotation
        run: |
          echo "### 🚀 Deployed to production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
