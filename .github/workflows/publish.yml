# ============================================================
# Publish — build the server image and push to GitHub Packages
# (GHCR). Runs on pushes to main; PRs only validate (see ci.yml).
# No external secrets needed — uses the built-in GITHUB_TOKEN.
# ============================================================

name: Publish server image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-server:
    name: Build & push server image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bkec-server
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: server
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
