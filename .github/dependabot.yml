# ============================================================
# Dependabot — BK English Center
# Automatically opens PRs for:
#   • npm packages (server & client)
#   • Docker base images
#   • GitHub Actions
# ============================================================

version: 2

updates:
  # ── Server (Express) npm packages ───────────────────────────
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      express-ecosystem:
        patterns:
          - "express*"
          - "cors"
          - "morgan"
          - "cookie-parser"
          - "http-errors"
      security:
        patterns:
          - "jsonwebtoken"
          - "bcrypt"
          - "express-rate-limit"

  # ── Client npm packages (Sass, etc.) ────────────────────────
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - frontend

  # ── Docker base images ───────────────────────────────────────
  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /client
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  # ── GitHub Actions ───────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
